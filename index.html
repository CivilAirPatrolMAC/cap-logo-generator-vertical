<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
	<title>Civil Air Patrol Vertical Subordinate Graphic Generator</title>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="shortcut icon" href="favicon.png">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500&display=block" rel="stylesheet">

	<script>
		let canvas, ctx, logoImage;

		const CANVAS_WIDTH = 1500;
		const CANVAS_HEIGHT = 650;
		const TEXT_Y = 602;

		const MAX_FONT_SIZE = 75;
		const MIN_FONT_SIZE = 40;
		const MAX_TEXT_WIDTH = 1100; // Safe width under logo

		const CAP_BLUE = '#001871';
		const DEFAULT_TEXT = 'Insert Text Here';

		document.addEventListener('DOMContentLoaded', async () => {
			canvas = document.getElementById('canvas');
			ctx = canvas.getContext('2d');

			canvas.width = CANVAS_WIDTH;
			canvas.height = CANVAS_HEIGHT;

			document.getElementById('download').onclick = download;
			document.getElementById('text').oninput = (e) => {
				render(e.target.value || DEFAULT_TEXT);
			};

			await Promise.all([loadFont(), loadLogo()]);
			render(DEFAULT_TEXT);
		});

		const loadFont = async () => {
			const font = new FontFace('Rajdhani', 'url(font.woff2)');
			await font.load();
			document.fonts.add(font);
			await document.fonts.ready;
		};

		const loadLogo = () => {
			return new Promise((resolve, reject) => {
				logoImage = new Image();
				logoImage.onload = resolve;
				logoImage.onerror = reject;
				logoImage.src = 'Logo-Vertical.svg';
			});
		};

		const clearCanvas = () => {
			ctx.clearRect(0, 0, canvas.width, canvas.height);
		};

		const drawSource = () => {
			ctx.drawImage(logoImage, 465, 0, 571, 562);
		};

		const normalizeText = (str) => {
			return (str || DEFAULT_TEXT).trim().toUpperCase();
		};

		// 🔥 NEW: Auto-scale font
		const getFittingFontSize = (text) => {
			let size = MAX_FONT_SIZE;

			while (size >= MIN_FONT_SIZE) {
				ctx.font = `${size}px Rajdhani`;
				const width = ctx.measureText(text).width;

				if (width <= MAX_TEXT_WIDTH) {
					return size;
				}

				size--;
			}

			return MIN_FONT_SIZE;
		};

		const drawText = (str) => {
			const text = normalizeText(str);

			const fontSize = getFittingFontSize(text);

			ctx.save();
			ctx.fillStyle = CAP_BLUE;
			ctx.font = `${fontSize}px Rajdhani`;
			ctx.textAlign = 'center';
			ctx.textBaseline = 'middle';

			ctx.fillText(text, canvas.width / 2, TEXT_Y);
			ctx.restore();
		};

		const render = (str) => {
			clearCanvas();
			drawSource();
			drawText(str);
		};

		const download = () => {
			const link = document.createElement('a');
			link.download = 'Unit-Vertical-Emblem.png';
			link.href = canvas.toDataURL('image/png');

			link.click();
		};
	</script>

	<style>
		body {
			padding: 40px;
			font-family: Ubuntu, sans-serif;
		}

		h1 {
			color: #001871;
			margin-bottom: 10px;
		}

		input {
			margin-top: 20px;
			padding: 10px;
			font-size: 18px;
			width: 400px;
		}

		.canvas-container {
			margin: 20px 0;
		}

		#canvas {
			width: 450px;
			height: 195px;
			border: 2px solid #9EA2A2;
			padding: 20px;
			border-radius: 12px;
		}

		button {
			background: #001871;
			color: white;
			padding: 10px 20px;
			border: none;
			border-radius: 5px;
			cursor: pointer;
		}

		button:hover {
			background: #000f5a;
		}
	</style>
</head>
<body>

	<h1>CAP Vertical Subordinate Generator</h1>

	<input id="text" placeholder="Insert Text Here" maxlength="40" />

	<div class="canvas-container">
		<canvas id="canvas"></canvas>
	</div>

	<button id="download">Download</button>

</body>
</html>
